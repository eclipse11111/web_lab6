<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Реєстрація</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="form-page">

<div class="page-wrapper">

    <div class="form-container">
        <h2>Реєстрація</h2>

        <form action="profile.html" method="GET">

            <div class="form-group">
                <label for="username">Ім'я користувача</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="submit-btn">
                Зареєструватися
            </button>

        </form>

        <p class="form-footer">
            Вже є акаунт? <a href="login.html">Увійти</a>
        </p>
    </div>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-column">
                <h3>Про нас</h3>
                <p>Мета роботи — навчитися працювати з CSS-стилями.</p>
            </div>
            <div class="footer-column">
                <h3>Контакти</h3>
                <p>Email: info@gmail.com</p>
                <p>Тел: +380661234567</p>
            </div>
            <div class="footer-column">
                <h3>Посилання</h3>
                <ul>
                    <li><a href="login.html">Логін</a></li>
                    <li><a href="profile.html">Профіль</a></li>
                    <li><a href="resume.html">Резюме</a></li>
                    <li><a href="schedule.html">Розклад</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
             2026 Всі права захищені
        </div>
    </footer>
</div>
</body>
</html>
