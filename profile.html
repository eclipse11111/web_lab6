<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Редагування профілю</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
<div class="page-wrapper">
    <div class="form-container">
        <h2>Редагування профілю</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="firstname">Ім'я</label>
                <input type="text" id="firstname" name="firstname">
            </div>

            <div class="form-group">
                <label for="lastname">Прізвище</label>
                <input type="text" id="lastname" name="lastname">
            </div>

            <div class="form-group">
                <label for="username">Логін</label>
                <input type="text" id="username" name="username">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="form-group">
                <label for="faculty">Факультет</label>
                <input type="text" id="faculty" name="faculty">
            </div>

            <div class="form-group">
                <label for="group">Група</label>
                <input type="text" id="group" name="group">
            </div>

            <div class="form-group">
                <label for="city">Місто</label>
                <input type="text" id="city" name="city">
            </div>

            <div class="form-group">
                <label for="bio">Про себе</label>
                <textarea id="bio" name="bio" rows="4"></textarea>
            </div>
            <button type="submit" class="submit-btn">
                Зберегти зміни
            </button>
        </form>
        <p class="form-footer">
            <a href="login.html">Вийти</a>
        </p>
    </div>
    <footer class="site-footer">
        <div class="footer-container">

            <div class="footer-column">
                <h3>Про нас</h3>
                <p>Мета роботи — навчитися працювати з CSS-стилями.</p>
            </div>

            <div class="footer-column">
                <h3>Контакти</h3>
                <p>Email: info@gmail.com</p>
                <p>Тел: +380661234567</p>
            </div>

            <div class="footer-column">
                <h3>Посилання</h3>
                <ul>
                    <li><a href="index.html">Реєстрація</a></li>
                    <li><a href="login.html">Логін</a></li>
                    <li><a href="resume.html">Резюме</a></li>
                    <li><a href="schedule.html">Розклад</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
             2026 Всі права захищені
        </div>
    </footer>
</div>
</body>
</html>
